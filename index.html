<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GarmentOS v28 - Native UI</title>
    
    <link rel="manifest" href='data:application/manifest+json;utf-8,%7B%22name%22%3A%22GarmentOS%22%2C%22short_name%22%3A%22GarmentOS%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%232563eb%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Butf8%2C%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ccircle%20cx%3D%2750%27%20cy%3D%2750%27%20r%3D%2750%27%20fill%3D%27%25232563eb%27%2F%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D'>

    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --primary: #2563eb;
            --primary-grad: linear-gradient(135deg, #3b82f6, #1d4ed8);
            --primary-soft: #eff6ff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --red: #ef4444;
            --red-grad: linear-gradient(135deg, #ef4444, #b91c1c);
            --green: #10b981;
            --green-grad: linear-gradient(135deg, #10b981, #047857);
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: -apple-system, sans-serif; margin: 0; padding: 0; line-height: 1.5; -webkit-font-smoothing: antialiased; }

        /* SVG ICONS BASE */
        .svg-icon { width: 20px; height: 20px; stroke-width: 2.5; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;}
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; stroke-width: 2.2;}
        .btn-icon-tiny .svg-icon { width: 16px; height: 16px; stroke-width: 2.5; }

        /* SECURE PIN SCREEN */
        #pinScreen { position: fixed; inset: 0; background: var(--text-dark); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pin-card { background: white; padding: 40px 30px; border-radius: 32px; width: 85%; max-width: 340px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .pin-input { width: 100%; font-size: 36px; letter-spacing: 16px; font-weight: 900; text-align: center; background: #f1f5f9; border: 2px solid transparent; border-radius: 20px; padding: 16px; margin: 25px 0; outline: none; transition: 0.3s; color: var(--text-dark); }
        .pin-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px var(--primary-soft); }

        /* BANNERS */
        .banner { display: none; color: white; text-align: center; padding: 14px; font-size: 13px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;}
        #backupNag { background: var(--red); animation: pulse 2s infinite; }
        #installBanner { background: var(--text-dark); }
        @keyframes pulse { 0% { background: var(--red); } 50% { background: #dc2626; } 100% { background: var(--red); } }

        /* LAYOUT & HEADER */
        .container { max-width: 600px; margin: 0 auto; padding: 0 20px 140px 20px; display: none; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 15px 0; position: sticky; top: 0; background: rgba(244, 247, 251, 0.85); backdrop-filter: blur(12px); z-index: 100; margin-bottom: 10px;}
        .app-header h1 { font-size: 26px; font-weight: 900; margin: 0; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .btn-shift { background: var(--text-dark); color: white; border: none; padding: 10px 16px; border-radius: 14px; font-weight: 800; font-size: 12px; cursor: pointer; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15); display: flex; align-items: center; gap: 6px;}

        /* FLOATING BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 25px; left: 20px; right: 20px; max-width: 560px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 28px; box-shadow: 0 12px 36px rgba(0,0,0,0.08); display: flex; justify-content: space-around; padding: 8px 12px; z-index: 1000; border: 1px solid rgba(255,255,255,0.6); }
        .nav-item { border: none; background: transparent; color: #94a3b8; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 8px; border-radius: 20px; width: 25%; transition: 0.3s; }
        .nav-item.active { background: var(--primary-soft); color: var(--primary); }

        /* SECTIONS & CARDS */
        .section { display: none; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--surface); border-radius: 24px; padding: 24px; border: none; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; }
        
        /* FLOATING INPUT LABELS (PREMIUM) */
        .floating-input { position: relative; margin-bottom: 16px; }
        .floating-input input, .floating-input select {
            width: 100%; padding: 22px 16px 8px 16px; border-radius: 16px;
            border: 2px solid transparent; background: #f1f5f9;
            font-size: 16px; font-weight: 700; color: var(--text-dark);
            outline: none; transition: 0.2s ease; font-family: inherit;
        }
        .floating-input label {
            position: absolute; left: 16px; top: 16px; font-size: 14px;
            color: var(--text-light); font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; transition: 0.2s ease; pointer-events: none;
        }
        .floating-input input:focus, .floating-input select:focus { border-color: var(--primary); background: #ffffff; box-shadow: 0 0 0 4px var(--primary-soft); }
        
        /* Float the label when input is focused or has text */
        .floating-input input:focus ~ label, .floating-input input:not(:placeholder-shown) ~ label,
        .floating-input select:focus ~ label, .floating-input select:valid ~ label {
            top: 6px; font-size: 10px; color: var(--primary);
        }
        .floating-input input[type="date"] ~ label { top: 6px; font-size: 10px; color: var(--primary); }

        /* BUTTONS */
        .btn { border: none; border-radius: 16px; padding: 18px; font-weight: 800; font-size: 15px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-primary { background: var(--primary-grad); color: white; }
        .btn-debt { background: var(--red-grad); color: white; }
        .btn-paid { background: var(--green-grad); color: white; }
        .btn-ob { background: #64748b; color: white; margin-top: 5px; }
        .btn-call { background: var(--primary-soft); color: var(--primary); font-size: 13px; padding: 8px 18px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; gap: 6px; border:none; cursor:pointer;}
        .btn-contact { background: var(--primary-soft); color: var(--primary); border: none; padding: 8px 14px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 15px;}
        
        .tx-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 15px; }
        .btn-icon-tiny { background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; color: var(--text-light); transition: 0.2s; display: flex; align-items: center; justify-content: center;}
        .btn-icon-tiny:active { transform: scale(0.9); }
        .btn-icon-tiny.delete:hover { background: #fee2e2; color: var(--red); }

        /* DIRECTORY LIST & AVATARS */
        .sup-card { display: flex; flex-direction: column; gap: 12px; cursor: pointer; border-bottom: 1px solid var(--border); border-radius: 0; margin-bottom: 0; padding: 20px 5px;}
        .sup-card:last-child { border-bottom: none; }
        .sup-row { display: flex; justify-content: space-between; align-items: center; }
        .sup-info { display: flex; align-items: center; gap: 14px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 800; text-transform: uppercase; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .sup-name { font-size: 17px; font-weight: 800; color: var(--text-dark); margin-bottom: 2px; display: block;}
        .sup-meta { font-size: 13px; color: var(--text-light); font-weight: 600; display: block;}
        .sup-bal { font-weight: 900; font-size: 16px; text-align: right;}

        /* EMPTY STATES */
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
        .empty-state svg { width: 64px; height: 64px; stroke: #cbd5e1; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text-dark); margin: 0 0 8px 0; font-weight: 800; }
        .empty-state p { font-size: 14px; margin: 0; font-weight: 500; }

        /* STATEMENTS */
        #stmtSummaryCard { background: var(--primary-soft); color: var(--text-dark); border: none; text-align: center;}
        #stmtBalance { font-size: 36px; margin: 10px 0; font-weight: 900;}
        .tx-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); border-left-width: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);}

        /* MODALS */
        #imageViewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; justify-content: center; align-items: center; }
        #imageViewer img { max-width: 95%; max-height: 90%; border-radius: 12px; object-fit: contain; }
        .close-viewer { position: absolute; top: 30px; right: 30px; color: white; cursor: pointer; background: rgba(255,255,255,0.2); width: 44px; height: 44px; border-radius: 22px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);}

        #editModalOverlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); z-index: 15000; justify-content: center; align-items: center; padding: 20px;}
        .edit-card { background: white; padding: 24px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);}

        #toast { visibility: hidden; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; font-weight: 700; z-index: 3000; white-space: nowrap; }
        #toast.show { visibility: visible; animation: dropDown 2.5s; }
        @keyframes dropDown { 0%, 100% { transform: translateX(-50%) translateY(-20px); opacity: 0; } 15%, 85% { transform: translateX(-50%) translateY(0); opacity: 1; } }

        /* PRINT STYLES */
        .print-header { display: none; text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        @media print { 
            body { background: white; color: black; }
            .bottom-nav, .app-header, .nav-item, #entry, #suppliers, #data, .tx-actions, .btn-call, #backupNag, #installBanner, label[for="statementSelect"], select#statementSelect, .filter-box { display: none !important; } 
            .container { display: block !important; padding: 0; max-width: 100%; }
            .card { border: none !important; box-shadow: none !important; padding: 10px 0 !important; margin-bottom: 0 !important; border-bottom: 1px solid #ccc !important; border-radius: 0 !important;}
            .print-header { display: block; }
            img { max-width: 300px !important; width: auto !important; display: block; margin-top: 10px; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div id="toast">Message</div>

<div id="imageViewer" onclick="this.style.display='none'">
    <div class="close-viewer"><svg class="svg-icon"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
    <img id="fullImage" src="" />
</div>

<div id="editModalOverlay">
    <div class="edit-card">
        <h3 style="margin-top:0; color:var(--primary); font-weight: 900;">Edit Entry</h3>
        
        <div class="floating-input">
            <select id="editType" required>
                <option value="Bill">Bill</option>
                <option value="Payment">Payment</option>
                <option value="Opening Balance">Opening Balance</option>
            </select>
            <label>Transaction Type</label>
        </div>
        
        <div class="floating-input">
            <input type="number" id="editAmt" placeholder=" " required>
            <label>Amount (Rs.)</label>
        </div>
        
        <div class="floating-input">
            <input type="date" id="editDate" required>
            <label>Date</label>
        </div>
        
        <input type="hidden" id="editTxId">
        
        <div style="display:flex; gap:12px;">
            <button class="btn" style="background:#e2e8f0; color:var(--text-dark);" onclick="closeEditModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>

<div id="pinScreen">
    <div class="pin-card">
        <div style="width: 64px; height: 64px; background: var(--primary-soft); color: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
            <svg class="svg-icon" style="width: 32px; height: 32px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h2 id="pinTitle" style="color:var(--text-dark); margin:0; font-weight: 900;">GarmentOS</h2>
        <p id="pinDesc" style="color:var(--text-light); font-size:14px; margin-top:8px; font-weight: 600;">Enter secure PIN</p>
        <input type="password" id="pinInput" class="pin-input" maxlength="4" inputmode="numeric">
        <button class="btn btn-primary" onclick="verifyPin()">Unlock Ledger</button>
    </div>
</div>

<div id="installBanner" class="banner" onclick="installApp()" style="display:none;">
    <svg class="svg-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Install App to Home Screen
</div>
<div id="backupNag" class="banner" onclick="exportToCSV(false)">
    <svg class="svg-icon"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/></svg> BACKUP REQUIRED: Secure recent data!
</div>

<div class="container" id="mainApp">
    
    <div class="print-header">
        <h1>Rabi Kapada Pasal</h1>
        <p>Statement of Account</p>
        <p id="printSupName" style="font-weight:bold; font-size: 18px;"></p>
        <p id="printDateRange"></p>
    </div>

    <div class="app-header">
        <h1>Rabi Kapada</h1>
        <button class="btn-shift" onclick="endShift()">
            <svg class="svg-icon" style="width:14px; height:14px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> End Shift
        </button>
    </div>

    <div id="entry" class="section active">
        <div class="card">
            <div class="floating-input">
                <select id="supplierSelect" required><option value="" disabled selected></option></select>
                <label>Supplier / Firm</label>
            </div>
            
            <div style="display: flex; gap: 12px;">
                <div class="floating-input" style="flex:1;">
                    <input type="number" id="amt" placeholder=" " required>
                    <label>Amount</label>
                </div>
                <div class="floating-input" style="flex:1;">
                    <input type="date" id="txDate" required>
                    <label>Date</label>
                </div>
            </div>
            
            <label>Paper Receipt (Optional)</label>
            <div style="position: relative; margin-bottom: 20px;">
                <input type="file" id="txImage" accept="image/*" capture="environment" style="background: white; border: 2px dashed #cbd5e1; padding: 16px; cursor: pointer; width: 100%; border-radius: 16px; font-weight: 600; color: var(--text-light);">
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 5px;">
                <button class="btn btn-debt" onclick="processEntry(true, 'Bill')">
                    <svg class="svg-icon"><path d="M12 5v14M5 12h14"/></svg> Add Bill
                </button>
                <button class="btn btn-paid" onclick="processEntry(false, 'Payment')">
                    <svg class="svg-icon"><path d="M5 12h14"/></svg> Add Payment
                </button>
            </div>
            <button class="btn btn-ob" onclick="processEntry(true, 'Opening Balance')">Log Past Dues</button>
        </div>
    </div>

    <div id="suppliers" class="section">
        <div class="card" style="padding-bottom: 10px;">
            <button class="btn-contact" onclick="importContact()">
                <svg class="svg-icon" style="width:14px; height:14px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Address Book
            </button>
            
            <div class="floating-input">
                <input type="text" id="supName" placeholder=" " required>
                <label>Firm Name</label>
            </div>
            <div class="floating-input">
                <input type="text" id="supCategory" placeholder=" ">
                <label>Category (Optional)</label>
            </div>
            <div class="floating-input">
                <input type="tel" id="supPhone" placeholder=" ">
                <label>Phone Number</label>
            </div>
            
            <button class="btn btn-primary" onclick="addSupplier()">
                <svg class="svg-icon"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg> Register Supplier
            </button>
        </div>
        
        <div class="floating-input" style="margin-bottom: 10px;">
            <input type="text" id="searchInput" onkeyup="filterDirectory()" placeholder=" " style="border-radius: 20px; background: white; border: 1px solid var(--border);">
            <label>🔍 Search Suppliers...</label>
        </div>
        
        <div id="supplierList" class="card" style="padding: 0 20px;"></div>
    </div>

    <div id="statements" class="section">
        <div class="card">
            <div class="floating-input">
                <select id="statementSelect" onchange="generateStatement()" required><option value="" disabled selected></option></select>
                <label>Select Firm</label>
            </div>
            
            <div class="filter-box" style="display: flex; gap: 12px; margin-top: 10px; padding-top: 15px; border-top: 1px solid var(--border);">
                <div class="floating-input" style="flex:1; margin-bottom:0;">
                    <input type="date" id="filterStart" onchange="generateStatement()" required>
                    <label>From</label>
                </div>
                <div class="floating-input" style="flex:1; margin-bottom:0;">
                    <input type="date" id="filterEnd" onchange="generateStatement()" required>
                    <label>To</label>
                </div>
            </div>
        </div>
        
        <div id="statementContent" style="display:none;">
            <div class="card" id="stmtSummaryCard">
                <label style="color:var(--primary);">Balance (Filtered Period)</label>
                <h2 id="stmtBalance">Rs. 0</h2>
                <div id="stmtPhoneContainer" style="margin-top: 15px;"></div>
                <button onclick="window.print()" class="btn-call" style="margin-top: 15px; background: white; border: 1px solid var(--primary);">
                    <svg class="svg-icon"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Create PDF Statement
                </button>
            </div>
            <div id="statementHistory"></div>
        </div>
    </div>

    <div id="data" class="section">
        <div class="card">
            <div style="width: 48px; height: 48px; background: var(--primary-soft); color: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                <svg class="svg-icon" style="width: 24px; height: 24px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            </div>
            <h3 style="margin: 0 0 5px 0; color: var(--text-dark); font-weight: 900; font-size: 20px;">Deep Storage Vault</h3>
            <p style="font-size: 14px; color: var(--text-light); margin-bottom: 25px; font-weight: 500;">Your ledger is stored 100% offline. Protect it.</p>
            
            <button class="btn btn-primary" style="margin-bottom: 30px;" onclick="exportToCSV(false)">
                <svg class="svg-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Backup to Excel / Drive
            </button>
            
            <label>Restore Data (Replaces current ledger)</label>
            <input type="file" id="importFile" accept=".csv" style="margin-bottom: 10px; background: white; border: 2px dashed var(--border); padding: 16px; border-radius: 16px; width: 100%; cursor: pointer;" onchange="importCSV(event)">
            
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">
            
            <label style="color: var(--red);">System Settings</label>
            <button class="btn btn-debt" onclick="clearData()">
                <svg class="svg-icon"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Format Device & Erase All
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('entry', this)">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            <span>Entry</span>
        </button>
        <button class="nav-item" onclick="switchTab('suppliers', this)">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            <span>Firms</span>
        </button>
        <button class="nav-item" onclick="switchTab('statements', this)">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>Khata</span>
        </button>
        <button class="nav-item" onclick="switchTab('data', this)">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
            <span>Data</span>
        </button>
    </div>
</div>

<script>
    // --- PWA INSTALLATION ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBanner').style.display = 'flex'; });
    function installApp() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then((c) => { if (c.outcome === 'accepted') document.getElementById('installBanner').style.display = 'none'; deferredPrompt = null; }); } }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register(URL.createObjectURL(new Blob([`self.addEventListener('fetch', function(e) {});`], { type: 'application/javascript' }))).catch(console.error); }

    // --- UI HELPERS ---
    const AVATAR_COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899'];
    function getAvatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }
    
    const EMPTY_FIRMS = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><h3>No Firms Registered</h3><p>Add your first supplier above to get started.</p></div>`;
    const EMPTY_TXS = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg><h3>No Transactions</h3><p>There are no bills or payments in this date range.</p></div>`;

    // --- DATABASE ---
    let db; let suppliers = []; let txs = [];
    let savedPin = localStorage.getItem('v28_pin');
    let lastBackupTime = parseInt(localStorage.getItem('v28_lastBackupTime')) || Date.now();
    let unbackedTxCount = parseInt(localStorage.getItem('v28_unbackedTxCount')) || 0;

    function initDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open("GarmentOS_DB_v6", 1);
            request.onupgradeneeded = function(e) {
                db = e.target.result;
                if (!db.objectStoreNames.contains("suppliers")) db.createObjectStore("suppliers", { keyPath: "id" });
                if (!db.objectStoreNames.contains("txs")) db.createObjectStore("txs", { keyPath: "id" });
            };
            request.onsuccess = function(e) { db = e.target.result; loadDataFromDB().then(resolve); };
            request.onerror = function(e) { showToast("Storage Error"); reject(); };
        });
    }

    function loadDataFromDB() {
        return new Promise((resolve) => {
            const tx = db.transaction(["suppliers", "txs"], "readonly");
            const reqSup = tx.objectStore("suppliers").getAll();
            const reqTxs = tx.objectStore("txs").getAll();
            tx.oncomplete = function() { suppliers = reqSup.result || []; txs = reqTxs.result || []; txs.sort((a, b) => b.id.localeCompare(a.id)); resolve(); };
        });
    }

    function saveToStore(storeName, dataObj) { const tx = db.transaction([storeName], "readwrite"); tx.objectStore(storeName).put(dataObj); }
    function deleteFromStore(storeName, id) { const tx = db.transaction([storeName], "readwrite"); tx.objectStore(storeName).delete(id); }
    function wipeDatabase() { const tx = db.transaction(["suppliers", "txs"], "readwrite"); tx.objectStore("suppliers").clear(); tx.objectStore("txs").clear(); }

    // --- SECURITY & TRACKING ---
    if (!savedPin) { document.getElementById('pinTitle').innerText = "Set a PIN"; }
    function verifyPin() {
        const val = document.getElementById('pinInput').value;
        if (!savedPin) { if(val.length !== 4) return alert("PIN must be exactly 4 digits"); localStorage.setItem('v28_pin', val); savedPin = val; startApp(); }
        else if (val === savedPin) { startApp(); }
        else { document.getElementById('pinInput').value = ''; document.getElementById('pinInput').style.borderColor = 'var(--red)'; setTimeout(() => document.getElementById('pinInput').style.borderColor = 'transparent', 500); }
    }
    
    function startApp() { document.getElementById('pinScreen').style.display = 'none'; document.getElementById('mainApp').style.display = 'block'; initDatabase().then(() => { renderUI(); checkBackupStatus(); }); }
    function lockApp() { document.getElementById('mainApp').style.display = 'none'; document.getElementById('backupNag').style.display = 'none'; document.getElementById('pinScreen').style.display = 'flex'; document.getElementById('pinInput').value = ''; }
    function trackNewEntry() { unbackedTxCount++; localStorage.setItem('v28_unbackedTxCount', unbackedTxCount); checkBackupStatus(); }
    function resetBackupTracker() { lastBackupTime = Date.now(); unbackedTxCount = 0; localStorage.setItem('v28_lastBackupTime', lastBackupTime); localStorage.setItem('v28_unbackedTxCount', unbackedTxCount); checkBackupStatus(); }
    function checkBackupStatus() { document.getElementById('backupNag').style.display = (unbackedTxCount >= 5 || (Date.now() - lastBackupTime) / 3600000 >= 24) ? 'flex' : 'none'; }

    async function importContact() {
        if (!('contacts' in navigator && 'ContactsManager' in window)) return showToast("Contact import not supported.");
        try { const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: false }); if (contacts && contacts.length > 0) { if (contacts[0].name) document.getElementById('supName').value = contacts[0].name[0]; if (contacts[0].tel) document.getElementById('supPhone').value = contacts[0].tel[0].replace(/[\s-]/g, ''); } } catch (ex) { showToast("Could not access contacts."); }
    }

    function renderUI() {
        document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
        const s1 = document.getElementById('supplierSelect'), s2 = document.getElementById('statementSelect');
        s1.innerHTML = '<option value="" disabled selected></option>'; s2.innerHTML = '<option value="" disabled selected></option>';
        const list = document.getElementById('supplierList'); list.innerHTML = '';
        
        if (suppliers.length === 0) {
            list.innerHTML = EMPTY_FIRMS;
        } else {
            suppliers.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
                let bal = txs.filter(t => t.supId === s.id).reduce((acc, t) => t.isDebt ? acc + t.val : acc - t.val, 0);
                s1.innerHTML += `<option value="${s.id}">${s.name}</option>`; s2.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                
                const initial = s.name.charAt(0).toUpperCase();
                const avatarColor = getAvatarColor(s.name);
                
                list.innerHTML += `
                    <div class="sup-card" onclick="jumpToStmt('${s.id}')">
                        <div class="sup-row">
                            <div class="sup-info">
                                <div class="avatar" style="background:${avatarColor}">${initial}</div>
                                <div>
                                    <span class="sup-name">${s.name}</span>
                                    <span class="sup-meta">${s.category || 'Vendor'}</span>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <span class="sup-bal" style="color:${bal>0?'var(--red)':'var(--green)'}">Rs. ${bal.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                ${s.phone ? `<br><a href="tel:${s.phone}" class="btn-call" style="padding: 2px 8px; font-size:10px; margin-top:4px;" onclick="event.stopPropagation()">📞 Call</a>` : ''}
                            </div>
                        </div>
                    </div>`;
            });
        }
    }

    function switchTab(id, btn) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); if(btn) btn.classList.add('active'); if(id === 'statements') generateStatement(); }
    function jumpToStmt(id) { document.getElementById('statementSelect').value = id; switchTab('statements', document.querySelectorAll('.nav-item')[2]); }

    function addSupplier() {
        const name = document.getElementById('supName').value.trim().replace(/,/g, ''); if (!name) return showToast("Firm name required");
        const newSup = { id: "SUP_" + Date.now().toString(), name, category: document.getElementById('supCategory').value.replace(/,/g, ''), phone: document.getElementById('supPhone').value.replace(/,/g, '') };
        suppliers.push(newSup); saveToStore("suppliers", newSup); renderUI(); showToast("Firm Registered");
        document.getElementById('supName').value = ''; document.getElementById('supCategory').value = ''; document.getElementById('supPhone').value = '';
    }

    function processEntry(isDebt, type) {
        const f = document.getElementById('txImage').files[0];
        if (f) {
            const reader = new FileReader(); reader.readAsDataURL(f);
            reader.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = () => { const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const scale = 800 / img.width; canvas.width = 800; canvas.height = img.height * scale; ctx.drawImage(img, 0, 0, 800, canvas.height); saveRecord(isDebt, type, canvas.toDataURL('image/jpeg', 0.7)); }; };
        } else saveRecord(isDebt, type, null);
    }

    function saveRecord(isDebt, type, img) {
        const id = document.getElementById('supplierSelect').value; const val = parseFloat(document.getElementById('amt').value);
        if (!id || isNaN(val)) return showToast("Please enter an amount");
        const newTx = { id: Date.now().toString(), supId: id, val, isDebt, type: type, date: document.getElementById('txDate').value, img };
        txs.unshift(newTx); saveToStore("txs", newTx); trackNewEntry(); renderUI(); showToast(type + " Saved");
        document.getElementById('amt').value = ''; document.getElementById('txImage').value = '';
    }

    function openEditModal(id) {
        const tx = txs.find(t => t.id === id); if(!tx) return;
        document.getElementById('editTxId').value = tx.id; document.getElementById('editAmt').value = tx.val;
        document.getElementById('editDate').value = tx.date; document.getElementById('editType').value = tx.type || (tx.isDebt ? 'Bill' : 'Payment');
        document.getElementById('editModalOverlay').style.display = 'flex';
    }
    function closeEditModal() { document.getElementById('editModalOverlay').style.display = 'none'; }
    function saveEdit() {
        const id = document.getElementById('editTxId').value; const amt = parseFloat(document.getElementById('editAmt').value);
        const date = document.getElementById('editDate').value; const type = document.getElementById('editType').value;
        if(isNaN(amt) || amt <= 0) return showToast("Invalid amount");
        const txIndex = txs.findIndex(t => t.id === id);
        if(txIndex > -1) {
            txs[txIndex].val = amt; txs[txIndex].date = date; txs[txIndex].type = type; txs[txIndex].isDebt = (type === 'Bill' || type === 'Opening Balance');
            saveToStore("txs", txs[txIndex]); trackNewEntry(); closeEditModal(); renderUI(); generateStatement(); showToast("Entry Updated");
        }
    }
    function deleteTx(id) { if(confirm("Are you sure you want to delete this transaction?")) { txs = txs.filter(t => t.id !== id); deleteFromStore("txs", id); renderUI(); generateStatement(); showToast("Transaction Deleted"); } }

    function openImage(src) { document.getElementById('fullImage').src = src; document.getElementById('imageViewer').style.display = 'flex'; }

    function generateStatement() {
        const id = document.getElementById('statementSelect').value; const cont = document.getElementById('statementContent');
        if (!id) { cont.style.display = 'none'; document.querySelector('.print-header').style.display = 'none'; return; }
        
        cont.style.display = 'block'; const s = suppliers.find(x => x.id === id);
        let sTxsAll = txs.filter(t => t.supId === id).sort((a, b) => new Date(a.date) - new Date(b.date));
        let currentRunBal = 0; sTxsAll.forEach(t => { currentRunBal += t.isDebt ? t.val : -t.val; t.runBal = currentRunBal; });

        const fStart = document.getElementById('filterStart').value, fEnd = document.getElementById('filterEnd').value;
        let displayTxs = [...sTxsAll];
        if (fStart) displayTxs = displayTxs.filter(t => t.date >= fStart);
        if (fEnd) displayTxs = displayTxs.filter(t => t.date <= fEnd);
        displayTxs.reverse(); 

        document.getElementById('stmtBalance').innerText = "Rs. " + currentRunBal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('printSupName').innerText = `Firm: ${s.name} ${s.phone ? ' | Ph: '+s.phone : ''}`;
        document.getElementById('printDateRange').innerText = (fStart || fEnd) ? `Period: ${fStart || 'Start'} to ${fEnd || 'Present'}` : "All Time";
        
        const phoneCont = document.getElementById('stmtPhoneContainer');
        if (s.phone) { phoneCont.innerHTML = `<a href="tel:${s.phone}" class="btn-call" style="background: white; color: var(--primary);"><svg class="svg-icon" style="width:14px; height:14px;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg> Call ${s.name}</a>`; } else { phoneCont.innerHTML = ''; }

        const hist = document.getElementById('statementHistory'); hist.innerHTML = '';
        
        if (displayTxs.length === 0) {
            hist.innerHTML = EMPTY_TXS;
        } else {
            displayTxs.forEach(t => {
                let title = t.type || (t.isDebt ? 'Bill' : 'Payment'); if (t.id.includes("_ob")) title = "Opening Balance";
                hist.innerHTML += `
                    <div class="tx-card" style="border-left-color: ${t.isDebt?'var(--red)':'var(--green)'};">
                        <div class="sup-row"><span style="font-weight:800; color:var(--text-dark);">${title}</span><span style="font-weight:900; font-size:17px;">Rs. ${t.val.toLocaleString('en-IN')}</span></div>
                        <div class="sup-meta" style="margin:4px 0">${t.date}</div>
                        <div class="sup-meta" style="font-weight:800; color:var(--primary);">Run Bal: Rs. ${t.runBal.toLocaleString('en-IN')}</div>
                        ${t.img ? `<img src="${t.img}" onclick="openImage(this.src)" style="width:100%; max-width:200px; border-radius:12px; margin-top:12px; border: 1px solid var(--border); cursor: zoom-in;">` : ''}
                        
                        <div class="tx-actions">
                            <button class="btn-icon-tiny" onclick="openEditModal('${t.id}')"><svg class="svg-icon"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                            <button class="btn-icon-tiny delete" onclick="deleteTx('${t.id}')"><svg class="svg-icon"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
                        </div>
                    </div>`;
            });
        }
    }

    function filterDirectory() { const q = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('#supplierList .sup-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }
    function clearData() { if(confirm("DANGER: Format Device?")) { wipeDatabase(); localStorage.clear(); location.reload(); } }
    
    function endShift() { if(confirm("End Shift? Prompting backup...")) { exportToCSV(true); } }
    async function exportToCSV(isShiftEnding = false) {
        if (txs.length === 0 && suppliers.length === 0) { showToast("No data"); if (isShiftEnding) lockApp(); return; }
        let csv = "Date,Firm Name,Category,Phone,Transaction Type,Amount\n";
        txs.forEach(t => { let sup = suppliers.find(s => s.id === t.supId) || {}; let txType = t.type || (t.isDebt ? 'Bill' : 'Payment'); if (t.id.includes("_ob")) txType = "Opening Balance"; csv += `${t.date},${sup.name || 'Unknown'},${sup.category || ''},${sup.phone || ''},${txType},${t.val}\n`; });
        const fileName = "GarmentOS_Master_Backup_" + new Date().toISOString().split('T')[0] + ".csv"; const file = new File([csv], fileName, { type: 'text/csv' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) { try { await navigator.share({ title: 'GarmentOS Backup', files: [file] }); resetBackupTracker(); if (isShiftEnding) lockApp(); } catch (e) { if (isShiftEnding) lockApp(); } } else { const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csv); const a = document.createElement('a'); a.href = encodedUri; a.download = fileName; document.body.appendChild(a); a.click(); document.body.removeChild(a); resetBackupTracker(); showToast("Downloaded"); if (isShiftEnding) setTimeout(lockApp, 1000); }
    }

    function importCSV(event) {
        const file = event.target.files[0]; if (!file) return;
        if(!confirm("Warning: Restoring will overwrite everything. Proceed?")) { document.getElementById('importFile').value = ''; return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n'); if(lines.length < 2) return showToast("Invalid File");
            wipeDatabase(); suppliers = []; txs = []; let importedCount = 0;
            for(let i=1; i<lines.length; i++) {
                if(!lines[i].trim()) continue; const cols = lines[i].split(',');
                if(cols.length >= 6) {
                    let date = cols[0].trim(), firmName = cols[1].trim(), category = cols[2].trim(), phone = cols[3].trim(), type = cols[4].trim(), val = parseFloat(cols[5]);
                    if (isNaN(val)) continue;
                    let sup = suppliers.find(s => s.name === firmName);
                    if(!sup) { sup = { id: "IMP_" + Date.now().toString() + Math.random().toString().slice(2,8), name: firmName, category: category, phone: phone}; suppliers.push(sup); saveToStore("suppliers", sup); }
                    let isDebt = (type === 'Bill' || type === 'Opening Balance');
                    let newTx = { id: "TX_" + Date.now().toString() + Math.random().toString().slice(2,8), supId: sup.id, val: val, isDebt: isDebt, type: type, date: date, img: null };
                    txs.push(newTx); saveToStore("txs", newTx); importedCount++;
                }
            }
            resetBackupTracker(); renderUI(); showToast(`Restored ${importedCount} transactions.`); document.getElementById('importFile').value = '';
        }; reader.readAsText(file);
    }
</script>
</body>
</html>
